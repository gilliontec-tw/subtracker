{% extends "base.html" %}
{% block title %}編輯訂閱 — SubTrack{% endblock %}
{% block nav_list %}active{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1>編輯訂閱</h1>
    <div class="page-sub">{{ sub.service_name }}</div>
  </div>
</div>

<div class="page-content">
  {% if error is defined and error %}
  <div class="alert alert-danger mb-4" style="border-radius:10px;padding:12px 16px;font-size:13px;margin-bottom:16px;">
    {{ error }}
  </div>
  {% endif %}
  <div class="card">
    <div class="card-body">
      <form method="POST" action="/subscriptions/{{ sub.id }}/edit">
        {{ csrf_field() }}

        <div class="form-group">
          <label class="form-label">服務名稱 <span style="color:var(--danger)">*</span></label>
          <input type="text" name="service_name" class="input" required value="{{ sub.service_name }}">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">登入帳號 <span style="color:var(--danger)">*</span></label>
            <input type="text" name="login_account" class="input" required value="{{ sub.login_account }}">
          </div>
          <div class="form-group">
            <label class="form-label">登入密碼</label>
            <input type="text" name="login_password" class="input" value="{{ sub.login_password or '' }}">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">狀態 <span style="color:var(--danger)">*</span></label>
            <select name="status" class="input" required>
              {% for value, label in status_options %}
              <option value="{{ value }}" {% if value == sub.status.value %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">到期日 <span style="color:var(--danger)">*</span></label>
            <input type="date" name="expiry_date" class="input" required value="{{ sub.expiry_date }}">
          </div>
          <div class="form-group">
            <label class="form-label">提前通知天數 <span style="color:var(--danger)">*</span></label>
            <select name="notification_days" class="input" required>
              {% for value, label in notification_options %}
              <option value="{{ value }}" {% if value == sub.notification_days.value %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">通知收件人 Email <span style="color:var(--danger)">*</span></label>
          <input type="text" name="notification_emails" class="input" required
                 value="{{ sub.notification_emails }}">
          <div class="form-hint">多個收件人請用逗號分隔</div>
        </div>

        <!-- 其他資訊 -->
        <div style="border-top:1px solid var(--border);margin:24px 0 20px;position:relative;">
          <span style="position:absolute;top:-9px;left:0;background:var(--card-bg,#fff);padding-right:12px;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;">其他資訊</span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">費用</label>
            <div style="display:flex;gap:8px;">
              <input type="number" name="cost" step="0.01" min="0" class="input"
                     value="{{ sub.cost if sub.cost else '' }}" placeholder="例如 12000">
              <select name="currency" class="input" style="width:90px;flex-shrink:0;">
                {% for c in currency_options %}
                <option value="{{ c }}" {% if c == sub.currency %}selected{% endif %}>{{ c }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">計費週期</label>
            <select name="billing_cycle" class="input">
              <option value="">— 請選擇 —</option>
              {% for value, label in billing_cycle_options %}
              <option value="{{ value }}" {% if sub.billing_cycle == value %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">分類</label>
            <select name="category" class="input">
              <option value="">— 請選擇 —</option>
              {% for opt in category_options %}
              <option value="{{ opt }}" {% if sub.category == opt %}selected{% endif %}>{{ opt }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">部門</label>
            <select name="department" class="input">
              <option value="">— 請選擇 —</option>
              {% for value, label in department_options %}
              <option value="{{ value }}" {% if sub.department == value %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">使用者</label>
            <input type="text" name="user_name" class="input"
                   value="{{ sub.user_name or '' }}" placeholder="例如：陳小明">
          </div>
          <div class="form-group">
            <label class="form-label">付款帳戶</label>
            <input type="text" name="payment_account" class="input"
                   value="{{ sub.payment_account or '' }}" placeholder="例如：公司美金卡末4碼1234">
          </div>
        </div>



        <div class="form-group">
          <label style="display:flex;align-items:center;gap:10px;font-size:13px;cursor:pointer;">
            <input type="checkbox" name="auto_renew" value="true"
                   {% if sub.auto_renew %}checked{% endif %}>
            自動續約（到期前會自動扣款）
          </label>
        </div>

        <div class="form-group">
          <label class="form-label">備註</label>
          <textarea name="notes" class="input" rows="3"
                    placeholder="合約編號、購買廠商、授權數量等">{{ sub.notes or '' }}</textarea>
        </div>

        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
          <a href="/" class="btn btn-outline">取消</a>
          <button type="submit" class="btn btn-primary">更新</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
