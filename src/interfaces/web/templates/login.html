{% extends "base.html" %}
{% block title %}登入 — SubTrack{% endblock %}

{% block auth_content %}
<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">S</div>
      <div class="login-title">SubTrack</div>
      <div class="login-sub">請登入以繼續</div>
    </div>

    {% if error %}
    <div class="alert alert-danger" style="margin-bottom:16px;">
      <span>{{ error }}</span>
      <button class="alert-close" onclick="this.parentElement.style.display='none'">×</button>
    </div>
    {% endif %}

    <form method="POST" action="/login">
      {{ csrf_field() }}
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="input" placeholder="yourname@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">密碼</label>
        <input type="password" name="password" class="input" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">登入</button>
    </form>
  </div>
</div>
{% endblock auth_content %}
