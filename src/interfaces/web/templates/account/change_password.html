{% extends "base.html" %}
{% block title %}修改密碼 — SubTrack{% endblock %}

{% block content %}
<div class="page-header">
  <div><h1>修改密碼</h1></div>
</div>
<div class="page-content">
  <div class="card" style="max-width:440px;">
    <div class="card-body">
      {% if success %}
      <div class="alert alert-success mb-4">密碼已成功更新。</div>
      {% endif %}
      {% if error %}
      <div class="alert alert-danger mb-4">{{ error }}</div>
      {% endif %}
      <form method="POST" action="/account/password">
        {{ csrf_field() }}
        <div class="form-group">
          <label class="form-label">目前密碼</label>
          <input type="password" name="current_password" class="input" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">新密碼</label>
          <input type="password" name="new_password" class="input" required>
        </div>
        <div class="form-group">
          <label class="form-label">確認新密碼</label>
          <input type="password" name="new_password_confirm" class="input" required>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
          <a href="/" class="btn btn-outline">取消</a>
          <button type="submit" class="btn btn-primary">更新密碼</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
