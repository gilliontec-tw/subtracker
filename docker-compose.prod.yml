version: "3.9"

services:
  api:
    build:
      target: production
    command: gunicorn api.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
      target: production
    command: python -m infrastructure.scheduler.main
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - subtrack
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      target: production
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - subtrack
    restart: unless-stopped
