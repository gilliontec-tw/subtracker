name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: subtrack
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: subtrack_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Format check (ruff)
        run: ruff format --check src/ tests/

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=src --cov-report=term-missing

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://subtrack:testpass@localhost:5432/subtrack_test
          REDIS_URL: redis://localhost:6379/0
          JWT_ACCESS_SECRET_KEY: test-access-secret
          JWT_REFRESH_SECRET_KEY: test-refresh-secret
          CORS_ORIGINS: '["http://localhost:5173"]'
        run: pytest tests/integration/ -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src/

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build
